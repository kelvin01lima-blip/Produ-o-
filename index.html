<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.S - Gestão de Produção e Pontuação</title>
    <style>
        :root {
            --primary: #2b6cb0;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #2d3748;
            --border: #e2e8f0;
            --success: #48bb78;
            --warning: #ecc94b;
            --danger: #f56565;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* Abas de Navegação */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: #e2e8f0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #4a5568;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 900px) {
            .grid-main {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        select, input[type="number"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            background: #fff;
        }

        /* Grid de Serviços */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .services-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .service-row {
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .service-info {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .service-info span {
            color: var(--primary);
            font-weight: bold;
        }

        .input-counter {
            display: flex;
            gap: 5px;
        }

        .btn-quick {
            background: #e2e8f0;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-quick:hover {
            background: #cbd5e0;
        }

        /* Status & Resultados */
        .live-preview {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .live-preview h3 {
            font-size: 14px;
            color: #718096;
            margin-bottom: 5px;
        }

        .total-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }

        .status-abaixo { background-color: #fed7d7; color: #9b2c2c; }
        .status-dentro { background-color: #feebc8; color: #9c4221; }
        .status-acima { background-color: #c6f6d5; color: #22543d; }

        .btn-action {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #2b6cb0;
        }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #718096;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Painel Consolidado */
        .collaborator-status-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .collab-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .meta-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .meta-container input {
            width: 90px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
        }

        /* Tabela Histórico */
        .history-filters {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        @media(min-width: 600px) {
            .history-filters {
                grid-template-columns: 1fr 1fr;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f7fafc;
            font-weight: bold;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #e53e3e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>S.O.S Soluções em Semijoias</h1>
        <p>Acompanhamento e Registro de Desempenho Diário</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('registro')">Registrar Produção</button>
        <button class="tab-btn" onclick="switchTab('historico')">Acompanhar Histórico de Dias</button>
    </div>

    <!-- ABA 1: REGISTRO E STATUS DIÁRIO -->
    <div id="tab-registro" class="tab-content active">
        <div class="grid-main">
            <!-- FORMULÁRIO DE LANÇAMENTO -->
            <div class="card">
                <div class="card-title">
                    <span>Lançar Produção</span>
                    <div class="meta-container">
                        <label style="margin: 0;">Meta Diária (pts):</label>
                        <input type="number" id="meta-input" value="292.00" step="10" oninput="calculateTotal()">
                    </div>
                </div>

                <div class="form-group">
                    <label for="collab-select">Colaboradora</label>
                    <select id="collab-select">
                        <option value="Brenda">Brenda</option>
                        <option value="Leidiane">Leidiane</option>
                        <option value="Cintia">Cintia</option>
                        <option value="Raquel">Raquel</option>
                        <option value="Fabiana">Fabiana</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date-select">Data do Trabalho</label>
                    <input type="date" id="date-select">
                </div>

                <label style="margin-bottom: 10px; display: block;">Serviços Realizados</label>
                <div class="services-grid" id="services-container">
                    <!-- Preenchido dinamicamente via JS -->
                </div>

                <div class="live-preview">
                    <h3>Pontuação Acumulada Neste Lançamento</h3>
                    <div class="total-value" id="live-total">0,00 pts</div>
                    <div id="status-tag" class="status-badge status-abaixo">Abaixo da Meta</div>
                </div>

                <button class="btn-action" onclick="salvarProducao()">Salvar Registro</button>
                <button class="btn-reset" onclick="resetForm()">Zerar Lançamentos Atuais</button>
            </div>

            <!-- RESUMO RÁPIDO DO DIA SELECIONADO -->
            <div class="card">
                <div class="card-title">Desempenho Geral do Dia Selecionado</div>
                <div id="dashboard-colaboradoras">
                    <!-- Gerado dinamicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- ABA 2: HISTÓRICO COMPLETO -->
    <div id="tab-historico" class="tab-content">
        <div class="card">
            <div class="card-title">Histórico de Produção Registrada</div>
            
            <div class="history-filters">
                <div class="form-group" style="margin:0;">
                    <label>Filtrar por Colaboradora</label>
                    <select id="filter-collab" onchange="renderHistoryTable()">
                        <option value="todos">Todas</option>
                        <option value="Brenda">Brenda</option>
                        <option value="Leidiane">Leidiane</option>
                        <option value="Cintia">Cintia</option>
                        <option value="Raquel">Raquel</option>
                        <option value="Fabiana">Fabiana</option>
                    </select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>Filtrar por Data</label>
                    <input type="date" id="filter-date" onchange="renderHistoryTable()">
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Colaboradora</th>
                            <th>Pontuação Total</th>
                            <th>Status da Meta</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <!-- Gerado dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Serviços e Pontuação correspondente por unidade feita (sem R$)
    const servicos = [
        { id: "inspecao", nome: "Inspeção", preco: 0.63 },
        { id: "fotografia", nome: "Fotografia", preco: 1.70 },
        { id: "cad_externo", nome: "Cadastro Externo", preco: 2.07 },
        { id: "etiquetas", nome: "Emissão e imp. Etiquetas", preco: 0.24 },
        { id: "encarte", nome: "Encarte", preco: 0.45 },
        { id: "montagem", nome: "Montagem", preco: 0.45 },
        { id: "cravacao", nome: "Cravação", preco: 0.63 },
        { id: "colagem", nome: "Colagem", preco: 0.54 },
        { id: "lixa", nome: "Lixa e acabamento", preco: 0.72 },
        { id: "bruto", nome: "Bruto", preco: 0.36 },
        { id: "cad_reposicao", nome: "Cadastro Reposição", preco: 0.45 },
        { id: "inspecao_corrente", nome: "Inspeção Corrente", preco: 0.31 },
        { id: "cad_interno", nome: "Cadastro Interno", preco: 0.50 },
        { id: "estoque", nome: "Estoque", preco: 18.75 },
        { id: "separacao", nome: "Separação", preco: 18.75 }
    ];

    const colaboradoras = ["Brenda", "Leidiane", "Cintia", "Raquel", "Fabiana"];
    
    // Banco de dados saved persistentemente no LocalStorage do navegador
    let historicoProducao = JSON.parse(localStorage.getItem('sos_producao_db')) || [];

    // Define a data padrão de hoje nos inputs de data
    function setTodayDate() {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('date-select').value = hoje;
    }

    // Gerencia as abas
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        if (tabName === 'registro') {
            document.querySelector('[onclick="switchTab(\'registro\')"]').classList.add('active');
            document.getElementById('tab-registro').classList.add('active');
            updateDashboard();
        } else {
            document.querySelector('[onclick="switchTab(\'historico\')"]').classList.add('active');
            document.getElementById('tab-historico').classList.add('active');
            renderHistoryTable();
        }
    }

    // Inicializa os inputs de serviços na tela
    function renderServices() {
        const container = document.getElementById('services-container');
        container.innerHTML = '';
        
        servicos.forEach(servico => {
            const row = document.createElement('div');
            row.className = 'service-row';
            row.innerHTML = `
                <div class="service-info">${servico.nome} (<span>${servico.preco.toFixed(2)} pts</span>)</div>
                <div class="input-counter">
                    <input type="number" id="input-${servico.id}" value="0" min="0" oninput="calculateTotal()" style="width: 70px; text-align: center;">
                    <button type="button" class="btn-quick" onclick="adjustValue('${servico.id}', 1)">+1</button>
                    <button type="button" class="btn-quick" onclick="adjustValue('${servico.id}', 10)">+10</button>
                    <button type="button" class="btn-quick" onclick="adjustValue('${servico.id}', 50)">+50</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function adjustValue(id, amount) {
        const input = document.getElementById(`input-${id}`);
        let val = parseInt(input.value) || 0;
        input.value = val + amount;
        calculateTotal();
    }

    // Calcula a pontuação total em tempo real
    function calculateTotal() {
        let total = 0;
        servicos.forEach(servico => {
            const qtd = parseInt(document.getElementById(`input-${servico.id}`).value) || 0;
            total += qtd * servico.preco;
        });

        document.getElementById('live-total').innerText = `${total.toFixed(2)} pts`;
        
        const meta = parseFloat(document.getElementById('meta-input').value) || 292.00;
        const statusTag = document.getElementById('status-tag');

        if (total >= meta) {
            statusTag.innerText = "Acima da Meta! 🔥";
            statusTag.className = "status-badge status-acima";
        } else if (total >= meta * 0.9) {
            statusTag.innerText = "Dentro da Meta/Próximo 🎯";
            statusTag.className = "status-badge status-dentro";
        } else {
            statusTag.innerText = "Abaixo da Meta 📉";
            statusTag.className = "status-badge status-abaixo";
        }

        return total;
    }

    // Reseta o formulário atual
    function resetForm() {
        servicos.forEach(servico => {
            document.getElementById(`input-${servico.id}`).value = 0;
        });
        calculateTotal();
    }

    // Salva o registro no banco de dados persistente (LocalStorage)
    function salvarProducao() {
        const collab = document.getElementById('collab-select').value;
        const data = document.getElementById('date-select').value;
        const total = calculateTotal();
        const meta = parseFloat(document.getElementById('meta-input').value) || 292.00;

        if (total === 0) {
            alert("Adicione a quantidade de pelo menos um serviço antes de salvar!");
            return;
        }

        // Verifica se já existe lançamento para essa colaboradora nesta data
        const indexExistente = historicoProducao.findIndex(item => item.collab === collab && item.data === data);

        if (indexExistente !== -1) {
            const confirmar = confirm(`${collab} já possui um registro de ${historicoProducao[indexExistente].pontos.toFixed(2)} pontos no dia ${formatarData(data)}. Deseja somar este novo registro ao existente?`);
            if (confirmar) {
                historicoProducao[indexExistente].pontos += total;
            } else {
                return;
            }
        } else {
            historicoProducao.push({
                id: Date.now(),
                collab: collab,
                data: data,
                pontos: total,
                meta: meta
            });
        }

        // Salva persistentemente
        localStorage.setItem('sos_producao_db', JSON.stringify(historicoProducao));
        
        alert("Produção gravada com sucesso!");
        resetForm();
        updateDashboard();
    }

    // Atualiza o painel consolidado do dia selecionado
    function updateDashboard() {
        const container = document.getElementById('dashboard-colaboradoras');
        container.innerHTML = '';

        const dataSelecionada = document.getElementById('date-select').value;
        const meta = parseFloat(document.getElementById('meta-input').value) || 292.00;

        colaboradoras.forEach(collab => {
            // Soma todos os registros dessa colaboradora no dia selecionado
            const total = historicoProducao
                .filter(item => item.collab === collab && item.data === dataSelecionada)
                .reduce((soma, item) => soma + item.pontos, 0);

            const porcentagem = Math.min((total / meta) * 100, 100);
            
            let corBarra = '#f56565';
            let statusTexto = 'Abaixo da Meta';

            if (total >= meta) {
                corBarra = '#48bb78';
                statusTexto = 'Meta Atingida!';
            } else if (total >= meta * 0.9) {
                corBarra = '#ecc94b';
                statusTexto = 'Próximo da Meta';
            }

            const item = document.createElement('div');
            item.className = 'collaborator-status-card';
            item.innerHTML = `
                <div class="collab-header">
                    <span>${collab}</span>
                    <span>${total.toFixed(2)} / ${meta.toFixed(2)} pts</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: ${porcentagem}%; background-color: ${corBarra};"></div>
                </div>
                <div style="font-size: 12px; text-align: right; font-weight: bold; color: ${corBarra}">
                    ${statusTexto} (${Math.round((total/meta)*100)}%)
                </div>
            `;
            container.appendChild(item);
        });
    }

    // Formata a data de AAAA-MM-DD para DD/MM/AAAA
    function formatarData(dataStr) {
        if (!dataStr) return "";
        const partes = dataStr.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    // Gera a tabela do histórico com os filtros de colaborador e data
    function renderHistoryTable() {
        const tBody = document.getElementById('history-table-body');
        tBody.innerHTML = '';

        const filterCollab = document.getElementById('filter-collab').value;
        const filterDate = document.getElementById('filter-date').value;

        // Filtra os dados
        const dadosFiltrados = historicoProducao.filter(item => {
            const matchesCollab = filterCollab === 'todos' || item.collab === filterCollab;
            const matchesDate = !filterDate || item.data === filterDate;
            return matchesCollab && matchesDate;
        });

        // Ordena por data decrescente (mais recente primeiro)
        dadosFiltrados.sort((a,b) => b.data.localeCompare(a.data));

        if (dadosFiltrados.length === 0) {
            tBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #718096;">Nenhum registro encontrado para os filtros selecionados.</td></tr>`;
            return;
        }

        dadosFiltrados.forEach(item => {
            const tr = document.createElement('tr');
            
            let badge = '';
            if (item.pontos >= item.meta) {
                badge = `<span class="status-badge status-acima" style="font-size: 11px; margin-top:0;">Acima da Meta</span>`;
            } else if (item.pontos >= item.meta * 0.9) {
                badge = `<span class="status-badge status-dentro" style="font-size: 11px; margin-top:0;">No Limite</span>`;
            } else {
                badge = `<span class="status-badge status-abaixo" style="font-size: 11px; margin-top:0;">Abaixo</span>`;
            }

            tr.innerHTML = `
                <td>${formatarData(item.data)}</td>
                <td><strong>${item.collab}</strong></td>
                <td>${item.pontos.toFixed(2)} pts</td>
                <td>${badge}</td>
                <td><button class="btn-delete" onclick="deletarRegistro(${item.id})">Excluir</button></td>
            `;
            tBody.appendChild(tr);
        });
    }

    // Deleta um registro específico do histórico
    function deletarRegistro(id) {
        if (confirm("Tem certeza que deseja excluir permanentemente este registro de produção?")) {
            historicoProducao = historicoProducao.filter(item => item.id !== id);
            localStorage.setItem('sos_producao_db', JSON.stringify(historicoProducao));
            renderHistoryTable();
            updateDashboard();
        }
    }

    // Inicialização da página
    window.onload = function() {
        setTodayDate();
        renderServices();
        calculateTotal();
        updateDashboard();

        // Evento para atualizar o desempenho de acordo com a data selecionada no formulário
        document.getElementById('date-select').addEventListener('change', updateDashboard);
    };
</script>

</body>
</html>
